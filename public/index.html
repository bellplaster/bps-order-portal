<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>BPS Order Portal | Bell Plaster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand-block">
      <img
        class="brand-logo"
        src="https://bellplastersupplies.com.au/cdn/shop/files/bell_logo_black.png?v=1781229976"
        alt="Bell Plaster"
      >
      <span class="brand-divider" aria-hidden="true"></span>
      <h1>BPS Order Portal</h1>
    </div>

    <button id="logoutButton" class="button button-secondary button-small" type="button">
      Sign out
    </button>
  </header>

  <main class="page-shell">
    <form id="orderForm" novalidate>
      <!-- Retained in code for future use, but intentionally hidden. -->
      <section class="form-card future-order-details" hidden>
        <input id="customerReference">
        <input id="jobName" value="BPS Brunswick Plastering Services">
        <input id="siteAddress1" value="125 Sussex Street">
        <input id="siteAddress2" value="Pascoe Vale VIC 3044">
        <input id="siteContact">
        <input id="siteContactPhone">
        <input id="requesterName" value="BPS">
        <input id="requesterPhone">
        <textarea id="comments"></textarea>
      </section>

      <div id="editModeBanner" class="edit-mode-banner" hidden>
        <div>
          <span>Editing order</span>
          <strong id="editOrderNumber"></strong>
          <small id="editRevisionText"></small>
        </div>

        <button id="cancelEditButton" class="button button-secondary button-small" type="button">
          Cancel edit
        </button>
      </div>

      <section class="form-card">
        <div class="section-heading floor-heading">
          <div>
            <h2>Order products</h2>
          </div>

          <div class="floor-tabs" role="tablist" aria-label="Floor order">
            <button class="floor-tab is-active" type="button" role="tab" aria-selected="true" data-floor-tab="ground">
              Ground Floor
              <span id="groundTabCount" class="tab-count">0</span>
            </button>

            <button class="floor-tab" type="button" role="tab" aria-selected="false" data-floor-tab="first">
              1st Floor
              <span id="firstTabCount" class="tab-count">0</span>
            </button>
          </div>
        </div>

        <article class="floor-panel is-active" data-floor-panel="ground">
          <div class="floor-toolbar">
            <label class="toggle-line">
              <input type="checkbox" id="groundEnabled" checked>
              <span><strong>Ground Floor</strong></span>
            </label>

            <div class="floor-summary" id="groundSummary">No products selected</div>
          </div>

          <div class="floor-content" data-floor-content="ground">
            <div class="product-heading">
              <h3>Products</h3>

              <label class="search-field">
                <span class="visually-hidden">Search Ground Floor products</span>
                <input type="search" id="groundProductSearch" placeholder="Search product or code">
              </label>
            </div>

            <div id="groundProductList" class="product-groups" aria-live="polite"></div>

            <label class="field manual-review-field">
              <span>Other products</span>
              <textarea id="groundOtherProducts" maxlength="3000" rows="3"
                placeholder="Product name, size and quantity. Bell Plaster will review these separately."></textarea>
            </label>
          </div>
        </article>

        <article class="floor-panel" data-floor-panel="first" hidden>
          <div class="floor-toolbar">
            <label class="toggle-line">
              <input type="checkbox" id="firstEnabled">
              <span><strong>1st Floor</strong></span>
            </label>

            <div class="floor-summary" id="firstSummary">Floor not included</div>
          </div>

          <div class="floor-content is-disabled" data-floor-content="first">
            <div class="product-heading">
              <h3>Products</h3>

              <label class="search-field">
                <span class="visually-hidden">Search 1st Floor products</span>
                <input type="search" id="firstProductSearch" placeholder="Search product or code" disabled>
              </label>
            </div>

            <div id="firstProductList" class="product-groups" aria-live="polite"></div>

            <label class="field manual-review-field">
              <span>Other products</span>
              <textarea id="firstOtherProducts" maxlength="3000" rows="3" disabled
                placeholder="Product name, size and quantity. Bell Plaster will review these separately."></textarea>
            </label>
          </div>
        </article>
      </section>

      <section class="form-card review-card">
        <div id="formMessage" class="message" hidden role="alert"></div>

        <div class="submit-row">
          <div>
            <p class="submit-note">A separate Accrivia file will be generated for each included floor.</p>
          </div>

          <button id="submitButton" class="button button-primary" type="submit">
            Submit order
          </button>
        </div>

        <div id="successPanel" class="success-panel" hidden>
          <h3 id="successTitle">Order created</h3>
          <p id="successSummary"></p>
          <div id="generatedFiles" class="generated-files"></div>
          <p class="submission-reference">
            Order number: <code id="orderNumberDisplay"></code>
          </p>
        </div>
      </section>
    </form>

    <section class="form-card order-history-card">
      <div class="section-heading">
        <div>
          <h2>Order history</h2>
        </div>

        <button id="refreshHistoryButton" class="button button-secondary button-small" type="button">
          Refresh
        </button>
      </div>

      <div id="orderHistoryStatus" class="history-status">Loading orders…</div>
      <div id="orderHistoryList" class="order-history-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <span>Bell Plaster</span>
    <span>BPS Order Portal</span>
  </footer>

  <script src="/app.js" defer></script>
</body>
</html>
