<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>BPS Standard Order Form | Bell Plaster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand-block">
      <img
        class="brand-logo"
        src="https://bellplastersupplies.com.au/cdn/shop/files/bell_logo_black.png?v=1781229976"
        alt="Bell Plaster"
      >
    </div>

    <button id="logoutButton" class="button button-secondary button-small" type="button">
      Sign out
    </button>
  </header>

  <main class="page-shell">
    <form id="orderForm" novalidate>
      <section class="future-order-details" hidden>
        <input id="customerReference">
        <input id="jobName" value="BPS Brunswick Plastering Services">
        <input id="siteAddress1" value="125 Sussex Street">
        <input id="siteAddress2" value="Pascoe Vale VIC 3044">
        <input id="siteContact">
        <input id="siteContactPhone">
        <input id="requesterName" value="BPS">
        <input id="requesterPhone">
        <textarea id="comments"></textarea>
      </section>

      <div id="editModeBanner" class="edit-mode-banner" hidden>
        <div>
          <span>Editing order</span>
          <strong id="editOrderNumber"></strong>
          <small id="editRevisionText"></small>
        </div>

        <button id="cancelEditButton" class="button button-secondary button-small" type="button">
          Cancel edit
        </button>
      </div>

      <section class="form-card order-sheet-card">
        <div class="section-heading sheet-heading">
          <div class="sheet-title-block">
            <p class="sheet-kicker">BPS Brunswick Plastering Services</p>
            <h1>Standard Order Form</h1>
            <p id="draftStatus" class="draft-status" aria-live="polite">
              Changes save automatically on this device.
            </p>
          </div>

          <div class="floor-tabs" role="tablist" aria-label="Order floor">
            <button class="floor-tab is-active" type="button" role="tab" aria-selected="true" data-floor-tab="ground">
              Ground Floor
              <span id="groundTabCount" class="tab-count">0</span>
            </button>

            <button class="floor-tab" type="button" role="tab" aria-selected="false" data-floor-tab="first">
              1st Floor
              <span id="firstTabCount" class="tab-count">0</span>
            </button>
          </div>
        </div>

        <article class="floor-panel is-active" data-floor-panel="ground">
          <div id="groundOrderSheet" class="excel-order-sheet" aria-live="polite"></div>

          <label class="field order-note-field">
            <span>Order note</span>
            <textarea
              id="groundOtherProducts"
              maxlength="3000"
              rows="3"
              placeholder="Add a message or special request for Bell Plaster."
            ></textarea>
          </label>
        </article>

        <article class="floor-panel" data-floor-panel="first" hidden>
          <div id="firstOrderSheet" class="excel-order-sheet" aria-live="polite"></div>

          <label class="field order-note-field">
            <span>Order note</span>
            <textarea
              id="firstOtherProducts"
              maxlength="3000"
              rows="3"
              placeholder="Add a message or special request for Bell Plaster."
            ></textarea>
          </label>
        </article>
      </section>

      <section class="form-card review-card">
        <div id="formMessage" class="message" hidden role="alert"></div>

        <div class="submit-row">
          <p class="submit-note">
            Ground Floor and 1st Floor files are generated separately.
          </p>

          <button id="submitButton" class="button button-primary" type="submit">
            Submit order
          </button>
        </div>

        <div id="successPanel" class="success-panel" hidden>
          <h3 id="successTitle">Order created</h3>
          <p id="successSummary"></p>
          <div id="generatedFiles" class="generated-files"></div>
          <p class="submission-reference">
            Order number: <code id="orderNumberDisplay"></code>
          </p>
        </div>
      </section>
    </form>

    <section class="form-card order-history-card">
      <div class="section-heading">
        <div>
          <h2>Order history</h2>
        </div>

        <button id="refreshHistoryButton" class="button button-secondary button-small" type="button">
          Refresh
        </button>
      </div>

      <div id="orderHistoryStatus" class="history-status">Loading orders…</div>
      <div id="orderHistoryList" class="order-history-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <span>Bell Plaster</span>
    <span>BPS Standard Order Form</span>
  </footer>

  <script src="/app.js" defer></script>
</body>
</html>
