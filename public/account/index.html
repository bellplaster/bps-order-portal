<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Account | Bell Plaster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=20260722-1">
  <link rel="stylesheet" href="/refinement.css?v=20260722-2">
  <link rel="stylesheet" href="/account-refinement.css?v=20260724-4">
</head>
<body class="account-page">
  <header class="portal-header">
    <a class="brand-link" href="/" aria-label="Bell Plaster order portal"><img src="https://bellplastersupplies.com.au/cdn/shop/files/bell_logo_black.png?v=1781229976" alt="Bell Plaster"></a>
    <div class="portal-actions"><a class="header-button" href="/">Order form</a><button id="logoutButton" class="header-button" type="button">Sign out</button></div>
  </header>

  <main class="account-shell">
    <header class="account-heading"><h1>Account</h1></header>
    <div id="accountMessage" class="portal-message" hidden role="alert"></div>

    <div class="account-grid">
      <section id="customerAccountCard" class="account-card profile-card">
        <header class="account-card-heading">
          <div><h2>Account details</h2><p>Used to prefill new orders.</p></div>
        </header>
        <form id="accountForm">
          <div class="account-fields">
            <label class="account-field account-field-meta"><span>Debtor code</span><div id="debtorCodeDisplay" class="readonly-field"></div></label>
            <label class="account-field account-field-meta"><span>Username</span><div id="usernameDisplay" class="readonly-field"></div></label>
            <label class="account-field full"><span>Company name</span><input id="companyName" maxlength="160" autocomplete="organization" required></label>
            <label class="account-field"><span>Default contact</span><input id="defaultContactName" maxlength="100" autocomplete="name"></label>
            <label class="account-field"><span>Phone</span><input id="defaultMobile" type="tel" maxlength="16" inputmode="tel" autocomplete="tel" placeholder="03 0000 0000"></label>
          </div>
          <div class="account-form-actions"><button class="button button-primary">Save changes</button></div>
        </form>
      </section>

      <section class="account-card security-card">
        <button id="togglePasswordPanel" class="security-toggle" type="button" aria-expanded="false" aria-controls="passwordPanel">
          <span><strong>Password</strong><small>Change your sign-in password</small></span>
          <b>Change</b>
        </button>
        <div id="passwordPanel" class="password-panel" hidden>
          <form id="passwordForm">
            <div class="account-fields password-fields">
              <label class="account-field current-password-field"><span>Current password</span><input id="currentPassword" type="password" autocomplete="current-password" required></label>
              <label class="account-field"><span>New password</span><input id="newPassword" type="password" autocomplete="new-password" minlength="8" required></label>
              <label class="account-field"><span>Confirm password</span><input id="confirmPassword" type="password" autocomplete="new-password" minlength="8" required></label>
            </div>
            <div class="account-form-actions password-actions"><button id="cancelPasswordChange" class="button button-secondary" type="button">Cancel</button><button class="button button-primary">Update password</button></div>
          </form>
        </div>
      </section>

      <section id="adminSection" class="account-card admin-section" hidden>
        <header class="account-card-heading"><div><h2>Administration</h2><p>Manage customer accounts, users and the Accrivia catalogue.</p></div></header>
        <div class="admin-card-body">
          <div class="admin-toolbar"><a class="button button-secondary" href="/catalog-admin/">Manage Accrivia catalogue</a></div>
          <div class="admin-layout">
            <div>
              <h3>Create customer account</h3>
              <form id="createAccountForm" class="account-fields">
                <label class="account-field"><span>Debtor code</span><input id="newDebtorCode" required></label>
                <label class="account-field"><span>Company name</span><input id="newCompanyName" required></label>
                <label class="account-field"><span>Default contact</span><input id="newDefaultContact"></label>
                <label class="account-field"><span>Phone</span><input id="newDefaultMobile" type="tel" maxlength="16" inputmode="tel" placeholder="03 0000 0000"></label>
                <div class="account-form-actions full"><button class="button button-primary">Create customer</button></div>
              </form>
              <h3>Customer accounts</h3><div id="accountsList" class="admin-list"></div>
            </div>
            <div>
              <h3>Create portal user</h3>
              <form id="createUserForm" class="account-fields">
                <label class="account-field"><span>Username</span><input id="newUsername" required></label>
                <label class="account-field"><span>Role</span><select id="newUserRole"><option value="customer">Customer</option><option value="admin">Administrator</option></select></label>
                <label class="account-field full"><span>Customer account</span><select id="newUserAccount"></select></label>
                <label class="account-field full"><span>Initial password</span><input id="newUserPassword" type="password" minlength="8" required></label>
                <div class="account-form-actions full"><button class="button button-primary">Create user</button></div>
              </form>
              <h3>Portal users</h3><div id="usersList" class="admin-list"></div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
  <script src="/account.js?v=20260724-2" defer></script>
  <script src="/phone-date-refinement.js?v=20260724-2" defer></script>
</body>
</html>
