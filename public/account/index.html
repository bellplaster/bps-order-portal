<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow,noarchive"><title>Account | Bell Plaster</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="/styles.css?v=20260722-1"><link rel="stylesheet" href="/refinement.css?v=20260722-2"></head><body class="account-page"><header class="portal-header"><a class="brand-link" href="/"><img src="https://bellplastersupplies.com.au/cdn/shop/files/bell_logo_black.png?v=1781229976" alt="Bell Plaster"></a><div class="portal-actions"><a class="header-button" href="/">Order form</a><button id="logoutButton" class="header-button" type="button">Sign out</button></div></header><main class="account-shell"><header class="account-heading"><p class="eyebrow">Portal settings</p><h1>Account</h1></header><div id="accountMessage" class="portal-message" hidden role="alert"></div><div class="account-grid"><section id="customerAccountCard" class="account-card"><header><h2>Account details</h2></header><div class="account-card-body"><form id="accountForm"><div class="account-fields"><label class="account-field"><span>Debtor code</span><div id="debtorCodeDisplay" class="readonly-field"></div></label><label class="account-field"><span>Username</span><div id="usernameDisplay" class="readonly-field"></div></label><label class="account-field full"><span>Company name</span><input id="companyName" maxlength="160" required></label><label class="account-field"><span>Default contact</span><input id="defaultContactName" maxlength="100"></label><label class="account-field"><span>Default mobile</span><input id="defaultMobile" type="tel" maxlength="14" placeholder="0400 000 000"></label></div><div class="account-form-actions"><button class="button button-primary">Save account</button></div></form></div></section><section class="account-card"><header><h2>Login &amp; security</h2></header><div class="account-card-body"><form id="passwordForm"><div class="account-fields"><label class="account-field full"><span>Current password</span><input id="currentPassword" type="password" autocomplete="current-password" required></label><label class="account-field full"><span>New password</span><input id="newPassword" type="password" autocomplete="new-password" minlength="10" required></label><label class="account-field full"><span>Confirm new password</span><input id="confirmPassword" type="password" autocomplete="new-password" minlength="10" required></label></div><div class="account-form-actions"><button class="button button-secondary">Change password</button></div></form></div></section><section id="adminSection" class="account-card admin-section" hidden><header><h2>Customer and user administration</h2></header><div class="account-card-body"><div class="account-form-actions" style="margin-top:0;margin-bottom:18px"><a class="button button-secondary" href="/catalog-admin/">Manage Accrivia catalogue</a></div><div class="admin-layout"><div><h3>Create customer account</h3><form id="createAccountForm" class="account-fields"><label class="account-field"><span>Debtor code</span><input id="newDebtorCode" required></label><label class="account-field"><span>Company name</span><input id="newCompanyName" required></label><label class="account-field"><span>Default contact</span><input id="newDefaultContact"></label><label class="account-field"><span>Default mobile</span><input id="newDefaultMobile" type="tel"></label><div class="account-form-actions full"><button class="button button-primary">Create customer</button></div></form><h3>Customer accounts</h3><div id="accountsList" class="admin-list"></div></div><div><h3>Create portal user</h3><form id="createUserForm" class="account-fields"><label class="account-field"><span>Username</span><input id="newUsername" required></label><label class="account-field"><span>Role</span><select id="newUserRole"><option value="customer">Customer</option><option value="admin">Administrator</option></select></label><label class="account-field full"><span>Customer account</span><select id="newUserAccount"></select></label><label class="account-field full"><span>Initial password</span><input id="newUserPassword" type="password" minlength="10" required></label><div class="account-form-actions full"><button class="button button-primary">Create user</button></div></form><h3>Portal users</h3><div id="usersList" class="admin-list"></div></div></div></div></section></div></main><script src="/account.js?v=20260722-2" defer></script></body></html>
