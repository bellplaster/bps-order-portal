<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Sign in | BPS Order Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card">
      <img
        class="login-logo"
        src="https://bellplastersupplies.com.au/cdn/shop/files/bell_logo_black.png?v=1781229976"
        alt="Bell Plaster"
      >
      <h1>BPS Order Portal</h1>
      <p class="login-copy">Enter the BPS portal password to continue.</p>

      <form id="loginForm">
        <label class="field">
          <span>Password</span>
          <input id="password" type="password" autocomplete="current-password" required autofocus>
        </label>

        <div id="loginMessage" class="message" hidden role="alert"></div>

        <button id="loginButton" class="button button-primary button-full" type="submit">
          Sign in
        </button>
      </form>
    </section>
  </main>

  <script src="/login.js" defer></script>
</body>
</html>
