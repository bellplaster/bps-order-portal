<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>Sign in | Brunswick Order Portal</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-card">
      <div class="brand-mark login-mark" aria-hidden="true">B</div>
      <p class="eyebrow">Bell Plaster Supplies</p>
      <h1>Brunswick Order Portal</h1>
      <p class="login-copy">Enter the portal password to continue.</p>

      <form id="loginForm">
        <label class="field">
          <span>Password</span>
          <input id="password" type="password" autocomplete="current-password" required autofocus>
        </label>

        <div id="loginMessage" class="message" hidden role="alert"></div>

        <button id="loginButton" class="button button-primary button-full" type="submit">
          Sign in
        </button>
      </form>
    </section>
  </main>

  <script src="/login.js" defer></script>
</body>
</html>
